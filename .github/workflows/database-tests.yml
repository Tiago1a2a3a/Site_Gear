name: Database tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Start local Supabase
        run: supabase start
      - name: Rebuild database from migrations
        run: supabase db reset
      - name: Run pgTAP RLS tests
        run: supabase test db
